spring:
  application:
    name: chickenfitness-api
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/chickenfitness;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt-secret: ${JWT_SECRET:dev-secret-change-me-in-prod-0123456789abcdef0123456789abcdef}
  jwt-expiration-hours: ${JWT_EXPIRATION_HOURS:168}
  upload-dir: ${UPLOAD_DIR:./uploads}
  cors-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    org.hibernate.SQL: warn
